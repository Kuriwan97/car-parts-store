<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог автозапчастей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-size: 16px; color: #333; }
        .user-info span { color: #667eea; font-weight: bold; }
        .nav { display: flex; gap: 15px; align-items: center; }
        .nav a { color: #667eea; text-decoration: none; padding: 8px 16px; border-radius: 5px; }
        .nav a:hover { background: #667eea; color: white; }
        .logout-btn { background: #e53e3e; color: white; padding: 8px 16px; border-radius: 5px; text-decoration: none; }
        .logout-btn:hover { background: #c53030; }
        .parts-frame { width: 100%; height: 600px; border: none; border-radius: 10px; background: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            Добро пожаловать, <span id="username">Пользователь</span>!
        </div>
        <div class="nav">
            <a href="user-catalog.html">📦 Каталог</a>
            <a href="profile">👤 Мой профиль</a>
            <a href="logout" class="logout-btn">🚪 Выйти</a>
        </div>
    </div>

    <iframe src="parts" class="parts-frame"></iframe>
</div>

<script>
    // Получаем имя пользователя
    fetch('profile?info=1')
        .then(response => response.json())
        .catch(() => {});
</script>
</body>
</html>
